//----------------------------------------------
// Sven Co-op v5.0 Default Server CFG
//----------------------------------------------

//----------------------------------------------
// See server_example.cfg for more available
// commands and settings.
//----------------------------------------------

hostname "[US] Ultra Hardcore Survival (+ Anti-Rush) - diff: 100%"
log "on"

rcon_password "nudes"
//sv_password ""

sys_ticrate 128
deathmatch 1
decalfrequency 30
hpk_maxsize 2
pausable 0
mapcyclefile "mapcycle.txt"

sv_aim 0

sv_downloadurl "https://github.com/MikkFalling/sv/raw/master/svencoop/"

sv_allowdownload 1
sv_allowupload 1
sv_region 0
sv_send_resources 1
sv_voicecodec "voice_speex"
sv_voiceenable 1
sv_voicequality 5
sv_log_player_frequency 0
sv_log_monster_monster_kills 1
sv_cheats 3

skillcfgfile scripts/plugins/store/skill.cfg

mp_telefrag 1
mp_timelimit 0
mp_weaponstay 1
mp_voteallow 1
mp_survival_voteallow 0
mp_survival_retries -1
mp_classic_mode 1
mp_nextmap_cycle choose_campaign_v3


## sv physics
sv_accelerate 10
sv_airaccelerate 10
sv_friction 6
sv_gravity 800
sv_spectatormaxspeed 700
sv_wateraccelerate 10
sv_wateramp 0
sv_waterfriction 1
sv_zmax 32768


## game configuration
mp_ammo_respawndelay -1
mp_item_respawndelay -1
mp_allowmonsterinfo 0
mp_banana 1
mp_npckill 2
mp_playervotedelay 300
mp_respawndelay 3
mp_votebanrequired 100
mp_votekickrequired 80
mp_votekill_respawndelay 15
mp_votekillrequired 66
mp_votemaprequired 80
mp_votetimebetween 120
mp_votetimecheck 20




## AFK TO SPEC
as_command afkm.bShouldSpec 1
as_command afkm.secondsUntilSpec 180

as_command afkm.bShouldKick 1

as_command afkm.secondsUntilKick 480

as_command afkm.bKickAdmins 0

as_command afkm.secondsWarnInterval 30

## CLASSIC MODE DELUXE
as_command cm on
as_command .cm on



bannedcfgfile banned2.cfg
listipcfgfile listip2.cfg

exec banned.cfg
exec listip.cfg
